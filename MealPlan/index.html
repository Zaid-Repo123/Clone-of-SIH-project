<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AyuAahar — Templates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FAFAF7] text-[#333333] antialiased min-h-screen [font-family:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe_UI,Roboto,'Helvetica Neue',Arial,'Noto Sans',sans-serif]">
  <!-- Mobile Top Bar -->
  <div class="md:hidden sticky top-0 z-40 border-b bg-[#F7F7FA]/80 backdrop-blur supports-[backdrop-filter]:bg-[#F7F7FA]/70 border-[#333333]/5">
    <div class="px-4 h-14 flex items-center justify-between">
      <button id="menuButton" class="inline-flex items-center justify-center rounded-md border px-2.5 py-2 hover:bg-white/80 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/50 bg-[#F5F4F0] border-[#5a524c]/10" aria-label="Open sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="menu" class="lucide lucide-menu w-5 h-5"><path d="M4 5h16"></path><path d="M4 12h16"></path><path d="M4 19h16"></path></svg>
      </button>
      <div class="flex items-center gap-2">
        <span class="text-lg tracking-tight font-semibold">Ayu-Aahar</span>
      </div>
      <div class="w-9 h-9 rounded-full overflow-hidden ring-1 ring-black/10">
        <img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?q=80&w=128&h=128&fit=crop" alt="Profile" class="w-full h-full object-cover">
      </div>
    </div>
  </div>

  <div class="relative flex min-h-[calc(100vh-0px)]">
    <!-- Overlay for mobile -->
    <div id="overlay" class="fixed inset-0 z-30 bg-black/30 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 border-r shadow-sm transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-out bg-[#F5F4F0] border-[#333333]/5">
      <div class="h-full flex flex-col">
        <!-- Logo -->
        <div class="h-16 px-5 flex items-center border-b border-[#333333]/5">
          <div class="flex items-baseline gap-2">
            <div class="inline-flex h-9 w-9 items-center justify-center rounded-md border text-sm font-medium tracking-tight text-[#333333] border-[#5a524c]/10 bg-[#F5F4F0]">
              AA
            </div>
            <div class="flex flex-col leading-tight">
              <span class="text-xl font-semibold tracking-tight">Ayu-Aahar</span>
              <span class="text-xs text-[#888888]">Dietician Panel</span>
            </div>
          </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 overflow-y-auto pt-4 pr-3 pb-4 pl-3">
          <ul class="space-y-1">
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="layout-dashboard" class="lucide lucide-layout-dashboard w-5 h-5 text-green-600"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="calendar" class="lucide lucide-calendar w-5 h-5 text-green-600"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg>
                <span>Calendar</span>

            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="messages-square" class="lucide lucide-messages-square w-5 h-5 text-green-600"><path d="M16 10a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 14.286V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path><path d="M20 9a2 2 0 0 1 2 2v10.286a.71.71 0 0 1-1.212.502l-2.202-2.202A2 2 0 0 0 17.172 19H10a2 2 0 0 1-2-2v-1"></path></svg>
                <span>Messages</span>
              </a>
            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="users" class="lucide lucide-users w-5 h-5 text-green-600"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><path d="M16 3.128a4 4 0 0 1 0 7.744"></path><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><circle cx="9" cy="7" r="4"></circle></svg>
                <span>Clients</span>
              </a>
            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 ring-1 ring-[#8B82D3]/20 hover:ring-[#8B82D3]/30 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40 text-sm font-medium text-[#333333] bg-[#b2c0a8]/10 rounded-md pt-2 pr-3 pb-2 pl-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="chef-hat" class="lucide lucide-chef-hat w-5 h-5 text-green-600"><path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"></path><path d="M6 17h12"></path></svg>
                <span>Meal Plans</span>
              </a>
            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="bar-chart-3" class="lucide lucide-bar-chart-3 w-5 h-5 text-green-600"><path d="M3 3v16a2 2 0 0 0 2 2h16"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg>
                <span>Analytics</span>
              </a>
            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="dumbbell" class="lucide lucide-dumbbell w-5 h-5 text-green-600"><path d="M17.596 12.768a2 2 0 1 0 2.829-2.829l-1.768-1.767a2 2 0 0 0 2.828-2.829l-2.828-2.828a2 2 0 0 0-2.829 2.828l-1.767-1.768a2 2 0 1 0-2.829 2.829z"></path><path d="m2.5 21.5 1.4-1.4"></path><path d="m20.1 3.9 1.4-1.4"></path><path d="M5.343 21.485a2 2 0 1 0 2.829-2.828l1.767 1.768a2 2 0 1 0 2.829-2.829l-6.364-6.364a2 2 0 1 0-2.829 2.829l1.768 1.767a2 2 0 0 0-2.828 2.829z"></path><path d="m9.6 14.4 4.8-4.8"></path></svg>
                <span>Exercises Lib</span>
              </a>
            </li>
            <li>
              <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="sparkles" class="lucide lucide-sparkles w-5 h-5 text-green-600"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path><path d="M20 2v4"></path><path d="M22 4h-4"></path><circle cx="4" cy="20" r="2"></circle></svg>
                <span>AI Tools</span>
              </a>
            </li>
          </ul>
        </nav>

        <!-- Logout -->
        <div class="border-t p-3 border-[#333333]/5">
          <a href="#" class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium hover:bg-[#F7F7FA] hover:ring-1 hover:ring-black/10 focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-[#8B82D3]/40">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="log-out" class="lucide lucide-log-out w-5 h-5 text-green-600"><path d="m16 17 5-5-5-5"></path><path d="M21 12H9"></path><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path></svg>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 md:pl-72">
      <!-- Header -->
      <header class="sticky top-0 z-20 border-b bg-[#F7F7FA]/80 backdrop-blur supports-[backdrop-filter]:bg-[#F7F7FA]/70 border-[#333333]/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
          <div class="py-5 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex items-center gap-3">
              <h1 class="text-2xl sm:text-3xl tracking-tight font-semibold">Meal Plan Templates</h1>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center gap-3 lg:gap-4">
              <!-- Search -->
              <div class="w-full sm:w-80">
                <label class="sr-only" for="search">Search</label>
                <div class="relative">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-lucide="search" class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-[#888888]"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
                  <input id="search" type="text" placeholder="Search meal plan template" class="w-full rounded-md border pl-10 pr-3 py-2.5 text-sm placeholder-[#888888] shadow-sm focus:border-[#8B82D3]/40 focus:ring-2 focus:ring-[#8B82D3]/30 outline-none bg-[#F5F4F0] border-[#5a524c]/10">
                </div>
              </div>
              <!-- Profile -->
              <div class="inline-flex items-center gap-3 rounded-md border px-3 py-2 shadow-sm hover:shadow transition bg-[#F5F4F0] border-[#5a524c]/10">
                <div class="w-9 h-9 rounded-full overflow-hidden ring-1 ring-black/10">
                  <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=128&h=128&fit=crop" alt="Dr. Adam Vasylenko" class="w-full h-full object-cover">
                </div>
                <div class="leading-tight">
                  <div class="text-sm font-medium">Dr. Adam Vasylenko</div>
                  <div class="text-xs text-[#888888]">Dietician</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
          <div id="mealplan-content">
            <!-- ...existing content will be moved here by script... -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // Move all content from the old main into the new #mealplan-content div
    window.addEventListener('DOMContentLoaded', function() {
      var oldMain = document.querySelector('main');
      if (oldMain) {
        var content = oldMain.innerHTML;
        var newContentDiv = document.getElementById('mealplan-content');
        if (newContentDiv) {
          newContentDiv.innerHTML = content;
        }
        oldMain.remove();
      }
    });

    // Mobile sidebar toggle
    const menuButton = document.getElementById('menuButton');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleSidebar() {
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    if (menuButton) menuButton.addEventListener('click', toggleSidebar);
    if (overlay) overlay.addEventListener('click', toggleSidebar);

    // Close sidebar with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !sidebar.classList.contains('-translate-x-full')) {
        toggleSidebar();
      }
    });

    // Lucide icons initialization
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
    });

    // Close details dropdowns on outside click (enhancement without animations)
    document.addEventListener('click', (e) => {
      document.querySelectorAll('details[open]').forEach((d) => {
        if (!d.contains(e.target)) d.removeAttribute('open');
      });
    });
  </script>
</body>
</html>
