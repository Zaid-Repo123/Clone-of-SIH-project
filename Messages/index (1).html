                <span class="tab-underline absolute bottom-0 left-0 right-0 h-[2px] bg-transparent transition-colors"></span>

                      <img src="https://images.unsplash.com/photo-1544006659-f0b21884ce1d?q=80&w=88&auto=format&fit=crop" alt="Example client" class="h-9 w-9 rounded-full object-cover ring-1" style="ring-color:rgba(0,0,0,0.05);">
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center justify-between gap-2">
                          <span class="truncate text-[14px] font-medium tracking-tight">Example client</span>
                          <span class="text-[12px]" style="color:#888888;">07:16 PM</span>
                        </div>
                        <div class="flex items-center gap-2 mt-1">
                          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#c89143; background:rgba(200,145,67,0.10); border:1px solid rgba(200,145,67,0.25);">Follow Up</span>
                          <span class="truncate text-[13px]" style="color:#888888;">Sure, please share the meal plan...</span>
                        </div>
                      </div>
                      <i data-lucide="bookmark" class="w-4.5 h-4.5 text-black/60"></i>
                    </button>
                  </li>
                  <li class="pt-1">
                    <button data-conv-id="2" class="conv-item w-full text-left px-3 py-3 rounded-md transition-colors flex items-center gap-3 hover:bg-[#F7F7FA]">

                          <span class="text-[12px]" style="color:#888888;">12:03 PM</span>
                        </div>
                        <div class="flex items-center gap-2 mt-1">

                      </div>

                    </button>

                <form id="messageForm" class="flex items-end gap-2">
                  <div class="flex-1 relative">
                    <textarea id="messageInput" rows="1" placeholder="Write a message..." class="w-full max-h-40 resize-none rounded-md pr-12 pl-3 py-2 outline-none focus:ring-2 transition text-[14px]" style="background:#FFFFFF; border:1px solid rgba(90,82,76,0.12); caret-color:#c89143;"></textarea>
                    <button type="button" id="attachBtn" class="absolute right-2 bottom-2 inline-flex items-center justify-center h-8 w-8 rounded-md hover:bg-[#F7F7FA] transition" aria-label="Attach">
                      <i data-lucide="paperclip" class="w-4.5 h-4.5"></i>
                    </button>
                  </div>
                  <button id="sendBtn" type="submit" class="h-10 w-10 rounded-full text-white flex items-center justify-center transition-transform active:translate-y-px hover:brightness-110 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-[#c89143]/50" style="background-color:#c89143;">
                    <i data-lucide="send" class="w-4.5 h-4.5 text-white"></i>
                  </button>
                </form>
                <div class="mt-2 text-[12px]" style="color:#888888;">Press Enter to send • Shift + Enter for new line</div>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
  </div>

  <button class="fixed right-5 bottom-5 h-12 w-12 rounded-full shadow-sm flex items-center justify-center transition hover:brightness-110 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-[#c89143]/50" aria-label="Support" style="background-color:#c89143;">
    <i data-lucide="message-circle" class="w-5.5 h-5.5 text-white"></i>
  </button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Lucide Icons
      if (window.lucide) {
        lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
      }

      // --- Bug Fix: Correct Sidebar Toggle ---
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const menuButton = document.getElementById('menuButton');

      function openSidebar() {
        if (sidebar && overlay) {
          sidebar.classList.remove('-translate-x-full');
          overlay.classList.remove('hidden');
        }
      }
      function closeSidebar() {
        if (sidebar && overlay) {
          sidebar.classList.add('-translate-x-full');
          overlay.classList.add('hidden');
        }
      }
      menuButton?.addEventListener('click', openSidebar);
      overlay?.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !overlay.classList.contains('hidden')) {
          closeSidebar();
        }
      });

      // --- Refactor: Class-based Tab Switching ---
      const tabButtons = document.querySelectorAll('.tab-btn');
      function setActiveTab(targetTab) {
        tabButtons.forEach(btn => {
          btn.classList.remove('active');
        });
        const activeBtn = document.querySelector(`.tab-btn[data-tab="${targetTab}"]`);
        activeBtn?.classList.add('active');
      }
      tabButtons.forEach(btn => {
        btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
      });

      // --- Dropdown Toggles ---
      document.querySelectorAll('[data-dropdown-btn]').forEach(btn => {
        const menu = document.querySelector(btn.dataset.dropdownBtn);
        if(menu) {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('hidden');
          });
        }
      });
      document.addEventListener('click', () => {
        document.querySelectorAll('[id^="dd"]').forEach(menu => menu.classList.add('hidden'));
      });
      
      // --- Conversations Data & Logic ---
      const conversations = {
        1: { id: 1, name: 'Example client', avatar: 'https://images.unsplash.com/photo-1544006659-f0b21884ce1d?q=80&w=88&auto=format&fit=crop', tag: { text: 'Follow Up', color: '#c89143', bg: 'rgba(200,145,67,0.10)', border: 'rgba(200,145,67,0.25)' }, messages: [{ from: 'in', text: 'Hello! Could you share a simple 7-day meal plan?', time: '07:15 PM' }, { from: 'out', text: 'Absolutely. Any dietary preferences I should consider?', time: '07:16 PM' }, { from: 'in', text: 'Vegetarian if possible. Also quick breakfast ideas!', time: '07:18 PM' }] },
        2: { id: 2, name: 'Another client', avatar: 'https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&w=88&auto=format&fit=crop', tag: { text: 'General', color: '#16a34a', bg: 'rgba(22,163,74,0.10)', border: 'rgba(22,163,74,0.20)' }, messages: [{ from: 'in', text: 'Is Greek yogurt okay for a high-protein snack?', time: '12:00 PM' }, { from: 'out', text: 'Yes, great choice! Add nuts or fruit for balance.', time: '12:02 PM' }, { from: 'in', text: 'Thanks! I’ll try that.', time: '12:03 PM' }] },
        3: { id: 3, name: 'Third client', avatar: 'https://images.unsplash.com/photo-1519345511563-1b1b0b2a4a9e?q=80&w=88&auto=format&fit=crop', tag: { text: 'Follow Up', color: '#c89143', bg: 'rgba(200,145,67,0.10)', border: 'rgba(200,145,67,0.25)' }, messages: [{ from: 'in', text: 'Can we reschedule to Friday?', time: 'Yesterday' }, { from: 'out', text: 'Friday 3 PM works. Sending invite now.', time: 'Yesterday' }] }
      };

      const convItems = document.querySelectorAll('.conv-item');
      const chatName = document.getElementById('chatName');
      const chatAvatar = document.getElementById('chatAvatar');
      const chatTag = document.getElementById('chatTag');
      const messagesEl = document.getElementById('messages');
      const chatScroll = document.getElementById('chatScroll');

      function renderMessages(conv) {
        messagesEl.innerHTML = '';
        const sep = document.createElement('div');
        sep.className = 'flex items-center justify-center my-3';
        sep.innerHTML = `<span class="px-3 py-1 rounded-full text-[12px]" style="color:#888888; background:#F5F4F0; border:1px solid rgba(90,82,76,0.10);">${conv.messages[0].time === 'Yesterday' ? 'Yesterday' : 'Today'}</span>`;
        messagesEl.appendChild(sep);

        conv.messages.forEach(msg => {
          const msgEl = document.createElement('div');
          if (msg.from === 'in') {
            msgEl.className = 'flex items-end gap-2 max-w-[80%]';
            msgEl.innerHTML = `<img src="${conv.avatar}" class="h-8 w-8 rounded-full object-cover ring-1" style="ring-color:rgba(0,0,0,0.05);" alt="${conv.name}"><div><div class="px-3 py-2 rounded-lg rounded-tl-sm" style="background:#F5F4F0; border:1px solid rgba(90,82,76,0.10);"><p class="text-[14px]">${msg.text}</p></div><div class="mt-1 text-[12px]" style="color:#888888;">${msg.time}</div></div>`;
          } else {
            msgEl.className = 'flex justify-end';
            msgEl.innerHTML = `<div class="max-w-[80%]"><div class="px-3 py-2 rounded-lg rounded-tr-sm" style="background:rgba(200,145,67,0.15); border:1px solid rgba(90,82,76,0.10);"><p class="text-[14px]">${msg.text}</p></div><div class="mt-1 flex items-center justify-end gap-1 text-[12px]" style="color:#888888;"><svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 6 9 17l-5-5"/></svg><span>${msg.time}</span></div></div>`;
          }
          messagesEl.appendChild(msgEl);
        });
        requestAnimationFrame(() => { chatScroll.scrollTop = chatScroll.scrollHeight; });
      }

      function setActiveConversation(id) {
        convItems.forEach(item => item.classList.remove('active'));
        document.querySelector(`[data-conv-id="${id}"]`)?.classList.add('active');
        
        const conv = conversations[id];
        if (!conv) return;
        
        chatName.textContent = conv.name;
        chatAvatar.src = conv.avatar;
        chatTag.textContent = conv.tag.text;
        chatTag.style.color = conv.tag.color;
        chatTag.style.background = conv.tag.bg;
        chatTag.style.border = `1px solid ${conv.tag.border}`;
        renderMessages(conv);
      }

      convItems.forEach(item => {
        item.addEventListener('click', () => {
          setActiveConversation(item.dataset.convId);
          if (window.innerWidth < 768) closeSidebar();
        });
      });

      // --- New Feature: Auto-sizing Textarea ---
      const messageInput = document.getElementById('messageInput');
      function autosizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = (messageInput.scrollHeight) + 'px';
      }
      messageInput.addEventListener('input', autosizeTextarea);

      // --- Send Message Logic ---
      const messageForm = document.getElementById('messageForm');
      function sendCurrentMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        const activeItem = document.querySelector('.conv-item.active');
        const id = activeItem ? activeItem.dataset.convId : '1';
        
        conversations[id].messages.push({ from: 'out', text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        messageInput.value = '';
        autosizeTextarea();
        renderMessages(conversations[id]);
      }

      messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        sendCurrentMessage();
      });

      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendCurrentMessage();
        }
      });

      // --- Initial Load ---
      setActiveTab('open');
      setActiveConversation('1');
      autosizeTextarea();
    });
  </script>
</body></html>
